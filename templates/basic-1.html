<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>웹디자인수업</title>
</head>
<body>
    hello
    <div style="width: 200px; height:200px; background:yellow;
     margin-top:40px; margin-left: 60px; padding-left: 20px; box-sizing: border-box; border: 1px solid black;">
        안녕하세요
        <div style="width: 60px; height: 60px; background: red;"></div>
        <div style="width: 60px; height: 60px; background: blue;"></div>
    </div>
    
    <div style="width:300px; height:150px; border:1px solid black; margin-top:20px;">
        <div style="background: blue; color: white">div1</div>
        <div style="background: blue; color: white">div2</div>

        <span style="background: red; color:white; display: block;">span1</span>
        <span style="background: red; color:white; display: block;">span2</span>
    </div>

    <header></header>
    <main></main>
    <footer></footer>
    <section></section>
    <article></article>
    <aside></aside>
    <nav></nav>

    <img style="width:300px; height: 300px; object-fit: cover; border-radius: 150px; border: 2px solid black;" src="https://image-cdn.hypb.st/https%3A%2F%2Fkr.hypebeast.com%2Ffiles%2F2018%2F10%2Fkakao-talk-2018-1.jpeg?q=75&w=800&cbr=1&fit=max"/>

    <input type="text" placeholder="아이디를 입력하세요"/>
    <input type="password" placeholder="비밀번호를 입력하세요"/>
    <input type="email" placeholder="이메일을 입력하세요"/>
    <input type="date" placeholder="날짜를 입력하세요"/>
    <input type="number" placeholder="숫자를 입력하세요"/>
    <input type="file" placeholder="파일을 선택하세요"/>

    <br/>

    <input type="radio" name="size" id = "size-s" value="small"/>
    <label for="size-s">Small</label>

    <input type="radio" name="size" id = "size-m" value="medium"/>
    <label for="size-m">Medium</label>

    <input type="radio" name="size" id = "size-l" value="large"/>
    <label for="size-l">Large</label>

    <input type="checkbox" name="size" id = "chk-size-s" value="small"/>
    <label for="chk-size-s">Small</label>
    <input type="checkbox" name="size" id = "chk-size-m" value="medium"/>
    <label for="chk-size-m">Medium</label>
    <input type="checkbox" name="size" id = "chk-size-l" value="large"/>
    <label for="chk-size-l">Large</label>

    <select>
        <option value="small">Small</option>
        <option value="medium">Medium</option>
        <option value="large">Large</option>
    </select>

    <textarea style="width: 300px; height: 150px; resize:none;" placeholder="내용을 입력하세요"></textarea>

    <button>확인</button>
    <a href="http://localhost:5000/signup">회원가입하기</a>

    <div style="width: 100px; height: 100px; background: #F54927; font-size: 20px; font-weight: bold; color: white;">
        Hello
    </div>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/CuMzz6Ji_ro?si=Q-YiwXur3EYkog3w" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


</body>
</html>
